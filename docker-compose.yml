version: '3.8'

services:
  flask-app:
    build: .
    container_name: flask-app
    expose:
      - '8000'
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask-app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge